name: Aggregate Global Counters

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  aggregate:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Aggregate from Issue comments
        env:
          GH_TOKEN: ${{ github.token }}
        run: python3 .github/scripts/aggregate.py
      - name: Commit and push global.json
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add dashboard/data/global.json
          git diff --staged --quiet && echo "No changes" && exit 0
          git commit -m "📊 auto aggregate"
          git pull --rebase --autostash || true
          git push
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
